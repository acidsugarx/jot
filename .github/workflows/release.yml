name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libgtk-3-dev librsvg2-dev patchelf
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: Jot ${{ github.ref_name }}
          releaseBody: Download the installer for your platform from the assets below.
          releaseDraft: false
          prerelease: false

  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download aarch64 DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "*aarch64.dmg" \
            --dir .

      - name: Calculate SHA256
        id: sha
        run: |
          DMG_FILE=$(ls *aarch64.dmg | head -1)
          echo "AARCH64_SHA=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "DMG_NAME=$DMG_FILE" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: acidsugarx/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update formula
        working-directory: tap
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          AARCH64_SHA="${{ steps.sha.outputs.AARCH64_SHA }}"
          DMG_NAME="${{ steps.sha.outputs.DMG_NAME }}"
          
          cat > Formula/jot.rb << EOF
          class Jot < Formula
            desc "Keyboard-first task manager with local-first storage"
            homepage "https://github.com/acidsugarx/jot"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/acidsugarx/jot/releases/download/v${VERSION}/${DMG_NAME}"
                sha256 "${AARCH64_SHA}"
              end
            end

            def install
              app.install "jot.app"
            end

            test do
              assert_path_exists bin.parent/"jot.app"
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jot.rb
          git commit -m "Update jot to v${{ steps.version.outputs.VERSION }}"
          git push
