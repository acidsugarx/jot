name: Feature request
description: Suggest an improvement or new capability
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Keep it brief if you want.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      placeholder: It would help if Jot could...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Optional examples, references, or mockups.
